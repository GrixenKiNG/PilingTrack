name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs of the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests + typecheck + lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Test env: random secrets so encryption module loads cleanly.
      # (Tests that exercise the encryption module override these per-test.)
      ENCRYPTION_KEY: '11111111111111111111111111111111111111111111111111111111111111ab'
      SESSION_SECRET: 'ci-session-secret-32-bytes-minimum-length-for-validation-xx'
      PIN_LOOKUP_SECRET: 'ci-pin-secret-base64-padding-here-1234567890abcdefghijklmnopqr=='
      DEVICE_KEY_LOOKUP_SECRET: 'ci-device-secret-base64-padding-here-1234567890abcdefghijklmn=='
      DATABASE_URL: 'postgresql://stub:stub@localhost:5432/stub'
      # prisma.config.ts resolves env('DATABASE_URL_POSTGRES') at load time
      # and throws if it's absent — even for `prisma generate`, which never
      # connects. The postinstall hook (npm run db:generate) runs during
      # `npm ci`, so without this stub the whole job dies at "Install deps".
      DATABASE_URL_POSTGRES: 'postgresql://stub:stub@localhost:5432/stub'
      REDIS_URL: 'redis://localhost:6379'
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        # Tests import generated types; run generate but skip migrations
        # (no DB in this job — unit tests mock @/lib/db).
        run: npm run db:generate

      # NOTE: `npm run lint` is currently broken locally due to a version
      # mismatch between eslint 10 and eslint-plugin-react inside
      # eslint-config-next ('contextOrFilename.getFilename is not a function').
      # Re-enable once we move to flat config or pin a working ESLint stack.
      # - name: Lint
      #   run: npm run lint

      - name: Typecheck
        # Use plain tsc here, not `npm run typecheck` — that one wraps a full
        # next build which is too heavy for the lint-and-tests gate.
        run: npx tsc --noEmit

      - name: Layer boundaries
        # Catches new core→services / modules→app / cross-module imports.
        # Existing violations are grandfathered in
        # scripts/.layer-boundaries-baseline.txt — see the script for how
        # to update after intentional cleanup.
        run: npx tsx scripts/check-layer-boundaries.ts

      - name: Migration guard
        # Fails the build on an un-reviewed DROP COLUMN / DROP TABLE / TRUNCATE
        # in prisma/migrations. Pure file scan, no DB. Reviewed destructive
        # migrations are allowlisted in scripts/.migration-guard-baseline.txt.
        # Prompted by the 2026-05-30 incident (a stray autogenerated DROP
        # COLUMN shipped unread). Was local-only via `npm run verify`; this
        # makes it a hard gate on every push/PR.
        run: npm run db:check-migrations

      - name: Unit tests
        # Only the in-src unit tests. Integration / contract suites need a
        # real Postgres + Redis — see the `integration` job below.
        run: npx vitest run src/

  # Validates that Prisma migrations apply cleanly on a real Postgres.
  # This catches a class of bugs that pure-mock unit tests miss:
  # syntax that Prisma's parser accepts but Postgres rejects,
  # ordering issues, and RLS policies that need DB state to compile.
  #
  # The tests under `tests/integration/` currently mock Prisma, so they
  # are not run here. A real-DB integration suite is a follow-up.
  schema-validation:
    name: Schema + migrations (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pilingtrack_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pilingtrack_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_PROVIDER: postgres
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pilingtrack_ci?schema=public'
      DATABASE_URL_POSTGRES: 'postgresql://postgres:postgres@localhost:5432/pilingtrack_ci?schema=public'
      REDIS_URL: 'redis://localhost:6379'
      SESSION_SECRET: 'ci-session-secret-32-bytes-minimum-length-for-validation-xx'
      ENCRYPTION_KEY: '11111111111111111111111111111111111111111111111111111111111111ab'
      PIN_LOOKUP_SECRET: 'ci-pin-secret-base64-padding-here-1234567890abcdefghijklmnopqr=='
      DEVICE_KEY_LOOKUP_SECRET: 'ci-device-secret-base64-padding-here-1234567890abcdefghijklmn=='
      NEXT_TELEMETRY_DISABLED: '1'
      SKIP_SEED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      # Validates migrations against a real Postgres — this is the
      # check that was missing from the audit (CI was on SQLite stubs).
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      # Smoke-check that migrations produced the expected schema —
      # cheap insurance against a silently-empty migration.
      - name: Verify schema applied
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d pilingtrack_ci \
            -tAc "select count(*) from information_schema.tables where table_schema='public'" \
            | awk '{ if ($1 < 30) { print "FAIL: only " $1 " tables, expected >= 30"; exit 1 } else { print "OK: " $1 " tables" } }'

  # Golden-path browser tests so the operator/admin core flows don't
  # silently break between releases. We don't run the full Playwright
  # suite here — only a curated set against chromium. The other specs
  # cover features in flux (PWA, sync v3 cleanup) and would block PRs
  # for the wrong reasons. Revisit once those areas stabilise.
  e2e:
    name: E2E (Playwright, chromium golden path)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pilingtrack_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pilingtrack_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_PROVIDER: postgres
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pilingtrack_ci?schema=public'
      DATABASE_URL_POSTGRES: 'postgresql://postgres:postgres@localhost:5432/pilingtrack_ci?schema=public'
      REDIS_URL: 'redis://localhost:6379'
      SESSION_SECRET: 'ci-session-secret-32-bytes-minimum-length-for-validation-xx'
      ENCRYPTION_KEY: '11111111111111111111111111111111111111111111111111111111111111ab'
      PIN_LOOKUP_SECRET: 'ci-pin-secret-base64-padding-here-1234567890abcdefghijklmnopqr=='
      DEVICE_KEY_LOOKUP_SECRET: 'ci-device-secret-base64-padding-here-1234567890abcdefghijklmn=='
      DEFAULT_TENANT_ID: 'ci'
      NEXT_TELEMETRY_DISABLED: '1'
      # NODE_ENV is deliberately NOT set at job level. `next build` and
      # `next start` need production (their default); building with
      # NODE_ENV=development loads the dev React build and crashes the
      # prerender of /_global-error ("Cannot read properties of null
      # (reading 'useContext')"). The seed step sets development locally
      # to pass prisma/seed.ts's assertNotProduction() guard.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed test users
        # Seed creates the operator@piling.ru / admin@piling.ru accounts
        # the E2E specs log in with. Fixed passwords from prisma/seed.ts.
        # NODE_ENV=development only here — seed refuses to run in production.
        run: npx tsx prisma/seed.ts
        env:
          NODE_ENV: development

      - name: Build Next.js
        run: npm run build

      # Cache the Playwright browser binaries so cold start isn't 1 min.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps when cache hit
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start app
        # Background; we'll wait on /api/liveness next.
        run: |
          npm run start &
          echo $! > .next-app.pid

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/liveness > /dev/null 2>&1; then
              echo "App is live after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: app did not start within 60s"
          curl -v http://localhost:3000/api/liveness || true
          exit 1

      - name: Run E2E (golden path subset, chromium only)
        # Curated list — these specs don't depend on retired features.
        # When the rest of e2e/ is cleaned up (sync v3 references, PWA),
        # widen this glob or drop it for the full suite.
        run: |
          npx playwright test \
            --project=chromium \
            e2e/app.spec.ts \
            e2e/operator-report-smoke.spec.ts \
            e2e/report-creation-flow.spec.ts
        env:
          BASE_URL: 'http://localhost:3000'

      - name: Stop app
        if: always()
        run: |
          [ -f .next-app.pid ] && kill "$(cat .next-app.pid)" || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
