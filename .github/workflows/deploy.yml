name: Deploy to prod

# Manual-only — no auto-deploy on push.
# Triggered from GitHub UI: Actions → Deploy to prod → Run workflow.
on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to redeploy (space-separated)'
        required: false
        default: 'app'
        type: choice
        options:
          - app
          - app workers
          - app workers ws
          - workers
          - ws

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + rebuild + restart
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id
          chmod 600 ~/.ssh/id
          ssh-keyscan -H 87.242.102.125 >> ~/.ssh/known_hosts

      - name: Pull, rebuild, restart
        env:
          SERVICES: ${{ inputs.services }}
        run: |
          # $SERVICES expands here (runner); \$VARS evaluate on the prod host.
          ssh -i ~/.ssh/id user1@87.242.102.125 "
            set -e
            cd /opt/pilingtrack
            BEFORE=\$(git rev-parse HEAD)
            git pull origin main
            SVCS=\"$SERVICES\"
            # A new Prisma migration means the 'migrate' image must be rebuilt
            # too — it bakes prisma/migrations at build time, so building only
            # app/workers would run 'migrate deploy' on a stale image and
            # silently skip the migration (runbook 008). Auto-include it.
            if git diff --name-only --diff-filter=A \"\$BEFORE\"..HEAD -- 'prisma/migrations/**' | grep -q .; then
              echo '>> New migration detected — adding migrate to the build set'
              SVCS=\"migrate \$SVCS\"
            fi
            df -h /
            # Build sequentially with a prune between — a parallel build fills
            # the 30 GB VPS disk to 100% (reference_prod_deploy_disk).
            for s in \$SVCS; do
              echo \">> Building \$s\"
              docker compose build \"\$s\"
              docker builder prune -f || true
            done
            docker compose up -d \$SVCS
          "

      - name: Verify health
        run: |
          for i in $(seq 1 30); do
            if curl -sf https://orionpiling.ru/api/health > /dev/null; then
              curl -s https://orionpiling.ru/api/health
              exit 0
            fi
            sleep 3
          done
          echo "Health check timed out after 90s"
          curl -s https://orionpiling.ru/api/health
          exit 1
