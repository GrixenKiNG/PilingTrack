name: Performance Engineering

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full load test at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - spike
          - soak

env:
  NODE_VERSION: '22'
  BASE_URL: 'http://localhost:3000'

jobs:
  # ============================================================
  # 1. Build + Unit Tests
  # ============================================================
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  # ============================================================
  # 2. E2E Tests (Playwright)
  # ============================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start app
        run: npm run dev &
        env:
          NODE_ENV: development

      - name: Wait for app
        run: npx wait-on http://localhost:3000 -t 60000

      - name: Run E2E tests
        run: npx playwright test --reporter=html

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7

  # ============================================================
  # 3. Smoke Load Test (Every PR)
  # ============================================================
  smoke-load:
    name: Smoke Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: e2e
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start app
        run: npm run dev &
        env:
          NODE_ENV: development

      - name: Wait for app
        run: npx wait-on http://localhost:3000 -t 60000

      - name: Run smoke load test
        run: node performance/k6/smoke.test.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-load-results
          path: performance/results/
          retention-days: 14

  # ============================================================
  # 4. Full Load Test (Nightly / Manual)
  # ============================================================
  full-load:
    name: Full Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'load') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run load test (report)
        run: k6 run performance/k6/report.test.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: performance/results/
          retention-days: 30

  # ============================================================
  # 5. Spike Test (Manual)
  # ============================================================
  spike-test:
    name: Spike Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'spike'

    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run spike test
        run: k6 run performance/k6/spike.test.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spike-test-results
          path: performance/results/
          retention-days: 30

  # ============================================================
  # 6. Soak Test (Weekly / Manual)
  # ============================================================
  soak-test:
    name: Soak Test
    runs-on: ubuntu-latest
    timeout-minutes: 480  # 8 hours
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'soak' ||
      github.event_name == 'schedule' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run soak test
        run: k6 run --out json=performance/results/soak-data.json performance/k6/soak.test.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soak-test-results
          path: performance/results/
          retention-days: 30
