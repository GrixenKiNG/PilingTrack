<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет соединения — PilingTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      color: #1f2937;
      margin-bottom: 12px;
    }
    p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #fef3c7;
      border-radius: 8px;
      color: #92400e;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .status.online {
      background: #d1fae5;
      color: #065f46;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #f3f4f6;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .status.online .spinner {
      border-top-color: #10b981;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      min-height: 48px;
      min-width: 48px;
    }
    .btn:hover {
      background: #2563eb;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .info {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Нет соединения</h1>
    <p>Проверьте подключение к интернету. Ваши данные сохранены локально и будут отправлены автоматически.</p>
    
    <div class="status" id="status">
      <div class="spinner"></div>
      <span id="status-text">Попытка подключения...</span>
    </div>

    <br>

    <button class="btn" onclick="location.reload()" id="retry-btn">
      🔄 Повторить попытку
    </button>

    <div class="info">
      💡 Все несохранённые отчёты автоматически сохраняются в локальном хранилище
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');

    function updateStatus(online) {
      if (online) {
        statusEl.classList.add('online');
        statusText.textContent = 'Соединение восстановлено!';
        
        // Reload after short delay
        setTimeout(() => location.reload(), 1500);
      } else {
        statusEl.classList.remove('online');
        statusText.textContent = 'Нет соединения';
      }
    }

    // Listen for online/offline events
    window.addEventListener('online', () => updateStatus(true));
    window.addEventListener('offline', () => updateStatus(false));

    // Check current status
    updateStatus(navigator.onLine);

    // Retry button
    document.getElementById('retry-btn').addEventListener('click', () => {
      statusText.textContent = 'Попытка подключения...';
      location.reload();
    });

    // Register message channel for queue count
    if ('serviceWorker' in navigator) {
      const messageChannel = new MessageChannel();
      messageChannel.port1.onmessage = (event) => {
        const count = event.data.count;
        if (count > 0) {
          document.querySelector('.info').textContent = 
            `💡 В очереди на отправку: ${count} отчётов`;
        }
      };
      
      navigator.serviceWorker.controller?.postMessage(
        { type: 'GET_QUEUE_COUNT' },
        [messageChannel.port2]
      );
    }
  </script>
</body>
</html>
