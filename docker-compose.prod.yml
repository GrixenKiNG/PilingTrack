# ============================================================
# PilingTrack — Production overlay
# ============================================================
# Apply on top of the base docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences vs the base compose (which is dev-friendly):
#   - DB / Redis / PgBouncer / MinIO ports NOT exposed to the host (only
#     the app, ws, and minio-console reach them via the internal network).
#   - NEXT_PUBLIC_WS_URL is taken from env (no hardcoded ws://localhost).
#   - Resource limits per service so a single container can't starve the
#     host. Tweak based on your VM size.
#   - JSON-file log driver with rotation so /var/lib/docker doesn't fill up.
#   - SKIP_SEED defaults to 1 — production data is seeded once at install,
#     not on every container restart.
#
# Required env vars (will fail fast if missing — see base compose for the
# full list of `:?` constraints):
#   POSTGRES_PASSWORD, SESSION_SECRET, ENCRYPTION_KEY, PIN_LOOKUP_SECRET,
#   DEVICE_KEY_LOOKUP_SECRET, NEXT_PUBLIC_WS_URL
# ============================================================

services:
  app:
    ports: !override
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL must be set in production}
      - HOSTNAME=0.0.0.0
      # Cap Node heap so the in-app /api/health memory check doesn't sit
      # at "warn" indefinitely (default Node grows heap toward host RAM).
      - NODE_OPTIONS=--max-old-space-size=512
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  workers:
    # Worker health port — bind to loopback only; nothing external should
    # talk to it directly (Caddy doesn't proxy it).
    ports: !override
      - "127.0.0.1:3002:3002"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  workers-pdf:
    # No host port exposed — each replica's health endpoint is reachable
    # via the internal network if needed. Keeping 3003 free on the host
    # avoids collisions when docker-compose maps a single port to two
    # replicas.
    ports: !reset []
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  ws:
    ports: !override
      - "127.0.0.1:3001:3001"
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  postgres:
    # Wipe the host port mapping — Postgres is only reachable from the
    # internal `pilingtrack` network. Reuse a managed RDS / Yandex Cloud
    # Postgres in real production by replacing this service with an
    # `external: true` network reference.
    ports: !reset []
    # PITR: ship WAL files to a host-mounted directory so we can replay
    # them on restore. /opt/pilingtrack/wal-archive must exist on the host
    # and be writable by uid 70 (alpine postgres user). See runbook 009.
    volumes:
      - postgres_data:/var/lib/postgresql
      - /opt/pilingtrack/wal-archive:/var/lib/postgresql/wal-archive
    # Override the base command to enable archive_mode. Keep all the
    # tuning parameters from base in sync — if base changes, mirror here.
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='test ! -f /var/lib/postgresql/wal-archive/%f && cp %p /var/lib/postgresql/wal-archive/%f'
      -c archive_timeout=3600
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  redis:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  pgbouncer:
    ports: !reset []
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  minio:
    ports: !override
      - "127.0.0.1:9001:9001"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  migrate:
    environment:
      - SKIP_SEED=${SKIP_SEED:-1}
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

  # The base compose already gates pgadmin behind `profiles: [dev]`, so it
  # won't start here unless explicitly requested. Nothing to override.
