# Prometheus — Standalone (no app dependencies)
# Scrapes only self + pushgateway

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # k6 Load Test Results
  - job_name: 'k6-results'
    scrape_interval: 5s
    static_configs:
      - targets: ['pushgateway:9091']

  # Prometheus Self
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9090']
