global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'log-only'

receivers:
  - name: 'log-only'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: false

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ['alertname', 'job']
