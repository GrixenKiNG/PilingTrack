# ============================================================
# ArgoCD ApplicationSet — PilingTrack Multi-Environment
# ============================================================
# Manages staging + production from a single manifest.
# Uses Git directory generator for env-specific values.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pilingtrack
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: pilingtrack
spec:
  generators:
    # Matrix generator: env x component
    - matrix:
        generators:
          - list:
              elements:
                - env: staging
                  namespace: pilingtrack-staging
                  valueFile: values-staging.yaml
                  targetRevision: main
                  autoSync: "true"
                  selfHeal: "true"
                  cluster: https://kubernetes.default.svc
                - env: production
                  namespace: pilingtrack-prod
                  valueFile: values-prod.yaml
                  targetRevision: "refs/tags/v*"
                  autoSync: "false"
                  selfHeal: "false"
                  cluster: https://kubernetes.default.svc
          - list:
              elements:
                - component: web
                  path: infra/helm/pilingtrack
                - component: ws
                  path: infra/helm/pilingtrack-ws
  template:
    metadata:
      name: 'pilingtrack-{{env}}-{{component}}'
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: pilingtrack
        environment: '{{env}}'
        component: '{{component}}'
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack: '#pilingtrack-deployments'
        notifications.argoproj.io/subscribe.on-sync-failed.slack: '#pilingtrack-alerts'
    spec:
      project: pilingtrack
      source:
        repoURL: https://github.com/pilingtrack/pilingtrack.git
        targetRevision: '{{targetRevision}}'
        path: '{{path}}'
        helm:
          valueFiles:
            - '{{valueFile}}'
      destination:
        server: '{{cluster}}'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: '{{selfHeal}}'
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: ""
          kind: Secret
          jsonPointers:
            - /data
