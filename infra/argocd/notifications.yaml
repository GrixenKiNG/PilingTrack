# ============================================================
# ArgoCD Notifications — PilingTrack
# ============================================================
# Sends Slack/Email notifications on sync events.

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  context: |
    pilingtrack.url: https://argocd.pilingtrack.com
    slack.channel: '#pilingtrack-deployments'

  trigger.on-sync-succeeded: |
    - description: Application sync succeeded
      send: [app-sync-succeeded]
      when: app.status.operationState.phase in ['Succeeded']

  trigger.on-sync-failed: |
    - description: Application sync failed
      send: [app-sync-failed]
      when: app.status.operationState.phase in ['Error', 'Failed']

  trigger.on-sync-running: |
    - description: Application sync is running
      send: [app-sync-running]
      when: app.status.operationState.phase in ['Running']

  trigger.on-health-degraded: |
    - description: Application health degraded
      send: [app-health-degraded]
      when: app.status.health.status == 'Degraded'

  template.app-sync-succeeded: |
    email:
      subject: '[ArgoCD] {{.app.metadata.name}} sync succeeded'
    message: |
      Application {{.app.metadata.name}} has been successfully synced.
      Environment: {{.app.metadata.labels.environment}}
      Revision: {{.app.status.sync.revision}}
      Synced at: {{.app.status.operationState.finishedAt}}
    slack:
      attachments: |
        [{
          "title": "Sync Succeeded — {{.app.metadata.name}}",
          "color": "#28a745",
          "fields": [{
            "title": "Environment",
            "value": "{{.app.metadata.labels.environment}}",
            "short": true
          }, {
            "title": "Revision",
            "value": "{{.app.status.sync.revision}}",
            "short": true
          }, {
            "title": "Synced At",
            "value": "{{.app.status.operationState.finishedAt}}",
            "short": false
          }]
        }]

  template.app-sync-failed: |
    email:
      subject: '[CRITICAL] {{.app.metadata.name}} sync FAILED'
    message: |
      Application {{.app.metadata.name}} failed to sync!
      Environment: {{.app.metadata.labels.environment}}
      Error: {{.app.status.operationState.message}}
    slack:
      attachments: |
        [{
          "title": "Sync FAILED — {{.app.metadata.name}}",
          "color": "#dc3545",
          "fields": [{
            "title": "Environment",
            "value": "{{.app.metadata.labels.environment}}",
            "short": true
          }, {
            "title": "Error",
            "value": "{{.app.status.operationState.message}}",
            "short": false
          }]
        }]

  template.app-sync-running: |
    email:
      subject: '[ArgoCD] {{.app.metadata.name}} sync started'
    slack:
      attachments: |
        [{
          "title": "Sync Running — {{.app.metadata.name}}",
          "color": "#ffc107",
          "fields": [{
            "title": "Environment",
            "value": "{{.app.metadata.labels.environment}}",
            "short": true
          }, {
            "title": "Revision",
            "value": "{{.app.status.sync.revision}}",
            "short": true
          }]
        }]

  template.app-health-degraded: |
    email:
      subject: '[WARNING] {{.app.metadata.name}} health degraded'
    slack:
      attachments: |
        [{
          "title": "Health Degraded — {{.app.metadata.name}}",
          "color": "#fd7e14",
          "fields": [{
            "title": "Environment",
            "value": "{{.app.metadata.labels.environment}}",
            "short": true
          }, {
            "title": "Health Status",
            "value": "{{.app.status.health.status}}",
            "short": true
          }]
        }]

---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  slack-token: "${SLACK_BOT_TOKEN}"
  slack-webhook-url: "${SLACK_WEBHOOK_URL}"
