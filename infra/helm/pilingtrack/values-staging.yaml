# Staging Values
global:
  environment: "staging"

api:
  replicaCount: 2
  image:
    tag: "1.0.0-rc"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    minReplicas: 1
    maxReplicas: 5
  podDisruptionBudget:
    minAvailable: 1

workers:
  outbox:
    replicaCount: 1
  projection:
    replicaCount: 1
  pdf:
    replicaCount: 1

websocket:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

ingress:
  hosts:
    - host: staging.pilingtrack.local
      paths:
        - path: /
          pathType: Prefix
          serviceName: api
          servicePort: 3000

observability:
  openTelemetry:
    enabled: true
    samplerArg: "1.0"
