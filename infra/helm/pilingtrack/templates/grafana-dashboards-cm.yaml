apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pilingtrack.fullname" . }}-grafana-dashboards
  labels:
    {{- include "pilingtrack.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  {{- $files := .Files.Glob "dashboards/*.json" }}
  {{- range $path, $fileContents := $files }}
  {{ base $path }}: |
{{ $fileContents | indent 4 }}
  {{- end }}
