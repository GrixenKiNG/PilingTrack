apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pilingtrack.fullname" . }}-config
  labels:
    {{- include "pilingtrack.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.global.environment | default "production" | quote }}
  DATABASE_PROVIDER: "postgres"
  ASYNC_OUTBOX: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  {{- if .Values.observability.openTelemetry.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.openTelemetry.endpoint | quote }}
  OTEL_SERVICE_NAME: "pilingtrack"
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.observability.openTelemetry.samplerArg | quote }}
  {{- end }}
