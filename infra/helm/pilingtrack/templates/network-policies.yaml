{{- if .Values.networkPolicy.enabled }}
---
# API — ingress from ingress controller, egress to DB/Redis/external
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pilingtrack.fullname" . }}-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - port: {{ .Values.api.service.port }}
          protocol: TCP
  egress:
    - to: []
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 443
          protocol: TCP
---
# Workers — no ingress, egress to DB/Redis/external
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pilingtrack.fullname" . }}-workers
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: worker
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to: []
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 443
          protocol: TCP
---
# WebSocket — ingress from ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pilingtrack.fullname" . }}-websocket
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: websocket
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - port: {{ .Values.websocket.service.port }}
          protocol: TCP
  egress:
    - to: []
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
