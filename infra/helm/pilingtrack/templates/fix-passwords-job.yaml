apiVersion: batch/v1
kind: Job
metadata:
  name: fix-passwords
  namespace: pilingtrack-prod
  labels:
    app.kubernetes.io/component: fix
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: fix
    spec:
      restartPolicy: Never
      containers:
        - name: fix
          image: pilingtrack:v2-local
          imagePullPolicy: Never
          command: ["sh", "-c"]
          args:
            - |
              export DATABASE_URL_POSTGRES="postgresql://postgres:pilingtrack@postgresql.pilingtrack-prod.svc.cluster.local:5432/pilingtrack"
              export DATABASE_PROVIDER="postgres"
              cd /app
              
              # Install bcrypt
              npm install --no-save bcrypt 2>/dev/null
              
              npx tsx -e "
              const { PrismaClient } = require('./src/generated/postgres-client/client');
              const bcrypt = require('bcrypt');
              const prisma = new PrismaClient({ datasources: { db: { url: process.env.DATABASE_URL_POSTGRES } } });
              async function main() {
                const users = [
                  { email: 'admin@piling.ru', password: 'admin123' },
                  { email: 'dispatch@piling.ru', password: '2222' },
                  { email: 'operator@piling.ru', password: 'operator123' },
                ];
                for (const u of users) {
                  const user = await prisma.user.findUnique({ where: { email: u.email } });
                  if (user) {
                    const newHash = bcrypt.hashSync(u.password, 12);
                    await prisma.user.update({ where: { email: u.email }, data: { password: newHash } });
                    console.log('Updated password for', u.email);
                  }
                }
                await prisma.\$disconnect();
                console.log('Done!');
              }
              main().catch(e => { console.error(e); process.exit(1); });
              "
              echo "✅ Passwords fixed!"
