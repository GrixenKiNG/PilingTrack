{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pilingtrack.fullname" . }}-backup
  labels:
    {{- include "pilingtrack.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  annotations:
    {{- with .Values.backup.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  timeZone: {{ .Values.backup.timeZone | default "UTC" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.backup.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.backup.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.backup.activeDeadlineSeconds | default 3600 }}
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "pilingtrack.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          {{- if .Values.backup.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml .Values.backup.imagePullSecrets | nindent 12 }}
          {{- end }}
          restartPolicy: Never

          containers:
            - name: pg-backup
              image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.backup.image.pullPolicy | default "IfNotPresent" }}
              command: ["/usr/local/bin/backup.sh"]
              env:
                - name: DB_HOST
                  value: {{ .Values.backup.dbHost | default (printf "%s-postgresql" .Release.Name) | quote }}
                - name: DB_PORT
                  value: {{ .Values.backup.dbPort | default "5432" | quote }}
                - name: DB_NAME
                  value: {{ .Values.backup.dbName | default "pilingtrack" | quote }}
                - name: DB_USER
                  value: {{ .Values.backup.dbUser | default "postgres" | quote }}
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.dbPasswordSecret | default "pilingtrack-postgresql" | quote }}
                      key: {{ .Values.backup.dbPasswordKey | default "postgres-password" | quote }}
                - name: REDIS_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pilingtrack.fullname" . }}-secrets
                      key: REDIS_URL
                      optional: true
                - name: BACKUP_DIR
                  value: {{ .Values.backup.backupDir | default "/backups/pilingtrack" | quote }}
                - name: RETENTION_DAYS
                  value: {{ .Values.backup.retentionDays | default 7 | quote }}
                - name: RETENTION_WEEKS
                  value: {{ .Values.backup.retentionWeeks | default 4 | quote }}
                - name: RETENTION_MONTHS
                  value: {{ .Values.backup.retentionMonths | default 12 | quote }}
                {{- if .Values.backup.s3Bucket }}
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3Bucket | quote }}
                - name: S3_ENDPOINT
                  value: {{ .Values.backup.s3Endpoint | default "" | quote }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3SecretName | default "pilingtrack-s3" | quote }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3SecretName | default "pilingtrack-s3" | quote }}
                      key: AWS_SECRET_ACCESS_KEY
                {{- end }}

              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}

              volumeMounts:
                - name: backup-storage
                  mountPath: /backups/pilingtrack

          volumes:
            - name: backup-storage
              {{- if .Values.backup.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "pilingtrack.fullname" . }}-backup-pvc
              {{- else }}
              emptyDir:
                sizeLimit: {{ .Values.backup.persistence.emptyDirSize | default "10Gi" | quote }}
              {{- end }}

          {{- with .Values.backup.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backup.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
{{- if and .Values.backup.enabled .Values.backup.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pilingtrack.fullname" . }}-backup-pvc
  labels:
    {{- include "pilingtrack.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - {{ .Values.backup.persistence.accessMode | default "ReadWriteOnce" | quote }}
  storageClassName: {{ .Values.backup.persistence.storageClassName | default "standard" | quote }}
  resources:
    requests:
      storage: {{ .Values.backup.persistence.size | default "20Gi" | quote }}
{{- end }}
{{- end }}
