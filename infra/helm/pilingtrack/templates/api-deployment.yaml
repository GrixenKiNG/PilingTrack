{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pilingtrack.fullname" . }}-api
  labels:
    {{- include "pilingtrack.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pilingtrack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  {{- with .Values.api.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "pilingtrack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pilingtrack.serviceAccountName" . }}
      {{- if .Values.podSecurity.enabled }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: {{ .Values.podSecurity.seccompProfile }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "pilingtrack.fullname" . }}-config
            {{- if or $.Values.secrets.databaseUrl $.Values.secrets.redisUrl $.Values.secrets.sessionSecret }}
            - secretRef:
                name: {{ include "pilingtrack.fullname" . }}-secrets
            {{- end }}
          env:
            {{- range .Values.api.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            - name: BACKUP_ENABLED
              value: {{ ternary "true" "false" .Values.backup.enabled | quote }}
            - name: BACKUP_DIR
              value: {{ .Values.backup.backupDir | default "/backups/pilingtrack" | quote }}
          {{- with .Values.api.probes.liveness }}
          livenessProbe:
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          {{- with .Values.api.probes.readiness }}
          readinessProbe:
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          {{- if .Values.podSecurity.enabled }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.podSecurity.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.podSecurity.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.podSecurity.capabilities | nindent 14 }}
          {{- end }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.api.affinity }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: api
                topologyKey: kubernetes.io/hostname
      {{- end }}
{{- end }}
