apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-db-push
  namespace: pilingtrack-prod
  labels:
    app.kubernetes.io/component: migration
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: prisma
          image: pilingtrack:v2-local
          imagePullPolicy: Never
          command: ["sh", "-c"]
          args:
            - |
              export DATABASE_URL_POSTGRES="postgresql://postgres:pilingtrack@postgresql.pilingtrack-prod.svc.cluster.local:5432/pilingtrack"
              export DATABASE_PROVIDER="postgres"
              cd /app
              # Use prisma from the builder stage - it's available via npx with version pin
              npm install --no-save prisma@6.19.3 @prisma/client@6.19.3 2>/dev/null
              ./node_modules/.bin/prisma db push --schema prisma/schema.postgres.prisma --accept-data-loss
