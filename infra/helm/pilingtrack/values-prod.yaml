# Production Values
global:
  environment: "production"

api:
  replicaCount: 5
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    minReplicas: 5
    maxReplicas: 30
    targetCPUUtilizationPercentage: 60
  podDisruptionBudget:
    minAvailable: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

workers:
  outbox:
    replicaCount: 3
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
  projection:
    replicaCount: 3
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
  pdf:
    replicaCount: 2
    resources:
      limits:
        cpu: "4"
        memory: 4Gi

websocket:
  replicaCount: 3
  resources:
    limits:
      cpu: "1"
      memory: 1Gi

ingress:
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: app.pilingtrack.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: api
          servicePort: 3000
    - host: ws.pilingtrack.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: websocket
          servicePort: 4000
  tls:
    - secretName: pilingtrack-tls-prod
      hosts:
        - app.pilingtrack.com
        - ws.pilingtrack.com

observability:
  openTelemetry:
    enabled: true
    samplerArg: "0.05"
