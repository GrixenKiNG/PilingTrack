# PgBouncer Configuration for PilingTrack
#
# PgBouncer is a lightweight connection pooler for PostgreSQL.
# It reduces connection overhead and improves throughput under high concurrency.
#
# Install:
#   Linux: apt install pgbouncer
#   Windows: Use WSL or Docker
#
# Docker (recommended for Windows):
#   docker run -d --name pgbouncer \
#     -p 6432:6432 \
#     -v $(pwd)/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini \
#     -v $(pwd)/userlist.txt:/etc/pgbouncer/userlist.txt \
#     edoburu/pgbouncer

[databases]
# Pool mode: transaction = best for high-concurrency web apps
pilingtrack = host=localhost port=5432 dbname=pilingtrack_test pool_mode=transaction max_db_connections=50

[pgbouncer]
# Listen on all interfaces
listen_addr = 0.0.0.0
listen_port = 6432

# Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pool settings
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

# Timeouts
server_lifetime = 3600
server_idle_timeout = 600
query_timeout = 30
query_wait_timeout = 30

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# Stats
stats_period = 10

# Admin access
admin_users = postgres
stats_users = postgres
