# ============================================================
# Docker Compose — Monitoring Stack
# ============================================================
# Includes: Prometheus, Grafana, exporters
#
# Usage:
#   docker compose -f docker-compose.monitoring.yml up -d
#   Grafana: http://localhost:3010 (admin/admin)
#   Prometheus: http://localhost:9090

version: '3.8'

services:
  # ============================================================
  # Prometheus
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: pilingtrack-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring

  # ============================================================
  # Grafana
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: pilingtrack-grafana
    ports:
      - '3010:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3010
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - prometheus

  # ============================================================
  # PostgreSQL Exporter (for PostgreSQL metrics)
  # ============================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pilingtrack-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:postgres@postgres:5432/pilingtrack?sslmode=disable
    ports:
      - '9187:9187'
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - postgres

  # ============================================================
  # Redis Exporter
  # ============================================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: pilingtrack-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - '9121:9121'
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - redis

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
