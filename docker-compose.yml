# ============================================================
# PilingTrack — Production Docker Compose
#
# Services:
# - app: Next.js application (port 3000)
# - ws: WebSocket real-time server (port 3001)
# - redis: Redis for Pub/Sub + caching
# - postgres: Primary database
# - pgadmin: Database management (dev only)
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f app    # Follow app logs
#   docker compose down           # Stop all services
# ============================================================

services:
  # ============================================================
  # Migrate — apply Prisma migrations and seed the database once.
  # ------------------------------------------------------------
  # Uses the builder stage which has the full node_modules + prisma CLI
  # + tsx. Exits when done; app/workers/ws wait for it via service_completed_successfully.
  # ============================================================
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: pilingtrack-migrate
    command: >
      sh -c "
        echo '➤ Applying Prisma migrations...' &&
        npx prisma migrate deploy &&
        if [ \"$$SKIP_SEED\" = \"1\" ]; then
          echo '➤ Skipping seed (SKIP_SEED=1).'
        else
          echo '➤ Seeding database (idempotent upserts)...' &&
          NODE_ENV=development npx tsx prisma/seed.ts
        fi &&
        echo '✓ Migration complete.'
      "
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}?schema=public
      - DATABASE_URL_POSTGRES=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}?schema=public
      - DATABASE_PROVIDER=postgres
      - SKIP_SEED=${SKIP_SEED:-0}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pilingtrack
    restart: "no"

  # ============================================================
  # Next.js Application
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: pilingtrack-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}?schema=public
      - DATABASE_URL_POSTGRES=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}?schema=public
      - DATABASE_PROVIDER=postgres
      - REDIS_URL=redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - REDIS_URL_CACHE=redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis-cache:6379
      - WS_URL=ws://ws:3001
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET must be set (min 32 chars)}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      - DEVICE_KEY_LOOKUP_SECRET=${DEVICE_KEY_LOOKUP_SECRET:?DEVICE_KEY_LOOKUP_SECRET must be set (min 32 chars)}
      - PIN_LOOKUP_SECRET=${PIN_LOOKUP_SECRET:?PIN_LOOKUP_SECRET must be set (min 32 chars)}
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_BUCKET=${S3_BUCKET:-pilingtrack-reports}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - TELEGRAM_API_BASE=${TELEGRAM_API_BASE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pilingtrack

  # ============================================================
  # Worker Service — Outbox + Projections + PDF
  # ============================================================
  # Runs background workers as a separate process for:
  # - Failure isolation (workers don't crash API)
  # - Independent scaling (scale workers without scaling API)
  # - Resource limits (CPU/memory per worker group)
  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
      target: runner
    container_name: pilingtrack-workers
    restart: unless-stopped
    ports:
      - "3002:3002"  # Health check port
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}?schema=public
      - DATABASE_URL_POSTGRES=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}?schema=public
      - DATABASE_PROVIDER=postgres
      - REDIS_URL=redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - REDIS_URL_CACHE=redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis-cache:6379
      - WORKER_HEALTH_PORT=3002
      - OUTBOX_INTERVAL_MS=${OUTBOX_INTERVAL_MS:-10000}
      - PROJECTION_INTERVAL_MS=${PROJECTION_INTERVAL_MS:-5000}
      - PDF_WORKER_CONCURRENCY=2
      # Control which workers to enable: outbox,projection,pdf
      - ENABLED_WORKERS=outbox,projection,pdf
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_BUCKET=${S3_BUCKET:-pilingtrack-reports}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - TELEGRAM_API_BASE=${TELEGRAM_API_BASE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - pilingtrack

  # ============================================================
  # WebSocket Real-Time Server
  # ============================================================
  ws:
    build:
      context: .
      dockerfile: Dockerfile.ws
      target: runner
    container_name: pilingtrack-ws
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}?schema=public
      - DATABASE_URL_POSTGRES=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}?schema=public
      - DATABASE_PROVIDER=postgres
      - REDIS_URL=redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - WS_PORT=3001
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET must be set (min 32 chars)}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      - DEVICE_KEY_LOOKUP_SECRET=${DEVICE_KEY_LOOKUP_SECRET:?DEVICE_KEY_LOOKUP_SECRET must be set (min 32 chars)}
      - PIN_LOOKUP_SECRET=${PIN_LOOKUP_SECRET:?PIN_LOOKUP_SECRET must be set (min 32 chars)}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - pilingtrack

  # ============================================================
  # PgBouncer — Connection Pooling (правило #19)
  # ============================================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pilingtrack-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-pilingtrack_test}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
      - ADMIN_USERS=${POSTGRES_USER:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pilingtrack

  # ============================================================
  # Redis (state) — rate-limit counters, queues, pub/sub
  # ------------------------------------------------------------
  # noeviction: losing a counter means a brute-force gets a free
  # extra window; losing a queued job means the work is dropped.
  # AOF on for durability across restarts.
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: pilingtrack-redis
    restart: unless-stopped
    ports:
      # Host port 6380 to avoid conflict with a Windows-installed Redis on 6379.
      # Containers still talk to the service via redis://redis:6379 (Docker network).
      - "6380:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    networks:
      - pilingtrack

  # ============================================================
  # Redis (cache) — response cache, API cache
  # ------------------------------------------------------------
  # allkeys-lru: cache miss is just a fresh fetch, eviction is fine.
  # No AOF — cache is rebuildable from source of truth.
  # ============================================================
  redis-cache:
    image: redis:7-alpine
    container_name: pilingtrack-redis-cache
    restart: unless-stopped
    # No host port — internal only. Reachable via redis-cache:6379.
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - --save
      - ""
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    networks:
      - pilingtrack

  # ============================================================
  # PostgreSQL — Primary Database
  # ============================================================
  postgres:
    image: postgres:18-alpine
    container_name: pilingtrack-postgres
    restart: unless-stopped
    ports:
      # Хостовой Postgres был на 5432 — мапим контейнер на 5435.
      # Внутри Docker-сети сервисы всё равно ходят на postgres:5432.
      - "5435:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the environment or .env}
      - POSTGRES_DB=${POSTGRES_DB:-pilingtrack_test}
    volumes:
      # Pg18+ docker images используют /var/lib/postgresql/<MAJOR>/docker как PGDATA.
      # Mount-point должен быть на /var/lib/postgresql, а не /var/lib/postgresql/data.
      - postgres_data:/var/lib/postgresql
      # init-rls.sql cannot run on first boot (Postgres applies it before any
      # migrations exist). RLS lives in Prisma migrations now —
      # see prisma/migrations/20260425000000_enable_rls_foundation.
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pilingtrack_test}"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pilingtrack

  # ============================================================
  # PgAdmin — Database Management (dev/stage only)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pilingtrack-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@pilingtrack.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set when the dev profile is enabled}
    profiles:
      - dev
    depends_on:
      - postgres
    networks:
      - pilingtrack

  # MinIO — S3-compatible storage for PDFs and report photos
  # Web console: http://localhost:9001 (login with MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
  # S3 API:      http://localhost:9000 (used by app via S3_ENDPOINT)
  # Optional. App falls back to local filesystem when S3 envs aren't set.
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: pilingtrack-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pilingtrack

  # MinIO bootstrap — creates the default bucket once on startup, then exits.
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: pilingtrack-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-pilingtrack-reports} &&
      echo 'Bucket ready: ${S3_BUCKET:-pilingtrack-reports}'
      "
    networks:
      - pilingtrack

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  pilingtrack:
    driver: bridge
