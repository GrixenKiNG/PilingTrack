# ============================================================
# Production monitoring (slim) — Prometheus + Grafana + node-exporter
# ============================================================
# Без Loki/Tempo (экономим диск). Логи смотрим через `docker logs`.
#
# Usage on prod VM:
#   docker compose -f docker-compose.monitoring-prod.yml up -d
#
# Ports (только 127.0.0.1 — наружу через Caddy с basic-auth):
#   Prometheus: 127.0.0.1:9090
#   Grafana:    127.0.0.1:3010

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: pilingtrack-prometheus
    ports:
      - '127.0.0.1:9090:9090'
    volumes:
      - ./observability/prometheus/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=14d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring
      - pilingtrack_pilingtrack
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  grafana:
    image: grafana/grafana:latest
    container_name: pilingtrack-grafana
    ports:
      - '127.0.0.1:3010:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://orionpiling.ru/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards/files:ro
      - ./observability/grafana/datasources/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 384m
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  node-exporter:
    image: prom/node-exporter:latest
    container_name: pilingtrack-node-exporter
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options: { max-size: '5m', max-file: '3' }

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pilingtrack-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-piling}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pilingtrack}?sslmode=disable
    restart: unless-stopped
    networks:
      - monitoring
      - pilingtrack_pilingtrack
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options: { max-size: '5m', max-file: '3' }

  alertmanager:
    image: prom/alertmanager:latest
    container_name: pilingtrack-alertmanager
    ports:
      - '127.0.0.1:9093:9093'
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://orionpiling.ru/alertmanager'
    environment:
      # The webhook receiver in alertmanager.yml references
      # /etc/alertmanager/webhook-token; we materialize it from env at
      # container start via the entrypoint override below.
      - ALERTMANAGER_WEBHOOK_TOKEN=${ALERTMANAGER_WEBHOOK_TOKEN:?ALERTMANAGER_WEBHOOK_TOKEN must be set}
    entrypoint:
      - sh
      - -c
      - 'printf %s "$$ALERTMANAGER_WEBHOOK_TOKEN" > /etc/alertmanager/webhook-token && exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - monitoring
      - pilingtrack_pilingtrack
    deploy:
      resources:
        limits:
          memory: 128m
    logging:
      driver: json-file
      options: { max-size: '5m', max-file: '3' }

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: pilingtrack-redis-exporter
    command:
      - '--redis.addr=redis://redis:6379'
    environment:
      # Redis on prod has requirepass set; without this the exporter
      # serves /metrics but every redis_* metric is NOAUTH-failed,
      # which surfaces as "no data" in every Grafana panel except
      # the PostgreSQL ones.
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - monitoring
      - pilingtrack_pilingtrack
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
      driver: json-file
      options: { max-size: '5m', max-file: '3' }

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  monitoring:
    driver: bridge
  pilingtrack_pilingtrack:
    external: true
